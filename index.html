<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shakshak - Google Login</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body{font-family:Arial;display:flex;min-height:100vh;align-items:center;justify-content:center;background:#0b0f14;color:#fff}
    .card{background:#121826;border:1px solid #223; border-radius:16px; padding:24px; width:min(420px,92vw); text-align:center}
    .hint{opacity:.8;margin:10px 0 18px}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      width:320px;max-width:100%;
      padding:10px 14px;border-radius:999px;
      border:1px solid #2a3550;background:#0f1726;color:#fff;
      cursor:pointer;margin-top:12px;font-size:14px
    }
    .btn:hover{filter:brightness(1.08)}
    .small{opacity:.75;font-size:12px;margin-top:10px;line-height:1.6}
    a{color:#7ab7ff;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h2>تسجيل الدخول بجوجل</h2>
    <div class="hint">اضغط للتسجيل… وسيتم الرجوع للموقع تلقائيًا</div>

    <div id="gbtn"></div>

    <button class="btn" id="chooseAnotherBtn" type="button">
      اختيار حساب تاني
    </button>

    <div class="small">
      لو الصفحة فتحت على حساب قديم: اضغط <b>اختيار حساب تاني</b> أو افتحها Incognito.
    </div>
  </div>

<script>
  const CLIENT_ID = "957912087788-4p3rbs4sksuqujiaq9trc7pss5349736.apps.googleusercontent.com";

  // هنستقبل origin من اللينك: ?origin=https://script.google.com
  const params = new URLSearchParams(location.search);
  const TARGET_ORIGIN = params.get("origin") || "https://script.google.com";

  function sendToken(idToken){
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ type: "GIS_TOKEN", idToken }, TARGET_ORIGIN);
      window.close();
    } else {
      document.body.innerHTML = "<div style='padding:40px;text-align:center'>تم ✅<br>اقفل الصفحة وارجع للموقع</div>";
    }
  }

  window.onload = () => {
    google.accounts.id.initialize({
      client_id: CLIENT_ID,
      callback: (resp) => sendToken(resp.credential),
      auto_select: false,
      cancel_on_tap_outside: false
    });

    google.accounts.id.renderButton(
      document.getElementById("gbtn"),
      { theme:"outline", size:"large", shape:"pill", text:"continue_with", locale:"ar", width:320 }
    );
  };
</script>
</body>
</html>
