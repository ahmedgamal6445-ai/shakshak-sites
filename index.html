<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shakshak - Google Login</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body{font-family:Arial;display:flex;min-height:100vh;align-items:center;justify-content:center;background:#0b0f14;color:#fff}
    .card{background:#121826;border:1px solid #223; border-radius:16px; padding:24px; width:min(420px,92vw); text-align:center}
    .hint{opacity:.8;margin:10px 0 18px}
  </style>
</head>
<body>
  <div class="card">
    <h2>تسجيل الدخول بجوجل</h2>
    <div class="hint">اضغط للتسجيل… وسيتم الرجوع للموقع تلقائيًا</div>
    <div id="gbtn"></div>
  </div>

<script>
const CLIENT_ID = "957912087788-4p3rbs4sksuqujiaq9trc7pss5349736.apps.googleusercontent.com";

// 👇 رابط الويب اب بتاعك
const WEBAPP_URL =
"https://script.google.com/macros/s/PUT_YOUR_DEPLOYMENT_ID/exec";

async function sendToken(idToken){

  try{
    const res = await fetch(WEBAPP_URL + "?action=googleLogin",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({ token:idToken })
    });

    const data = await res.json();

    if(data.success){
      localStorage.setItem("user", JSON.stringify(data.user));
      window.location.href = WEBAPP_URL; // رجوع للموقع
    }else{
      alert("فشل تسجيل الدخول");
    }

  }catch(e){
    alert("خطأ اتصال");
  }
}

window.onload = () => {
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: (resp)=> sendToken(resp.credential),
  });

  google.accounts.id.renderButton(
    document.getElementById("gbtn"),
    { theme:"outline", size:"large", width:320 }
  );
};
</script>
